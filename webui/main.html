<html>
<head>
  <title>SwissCheese</title>
  <script type="module">
    import { store } from "/plugins/swiss_cheese/webui/swiss-cheese-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.swissCheese">
      <div class="swiss-cheese-dashboard" x-init="await $store.swissCheese.onOpen()">
        <div class="swiss-cheese-header">
          <div>
            <div class="swiss-cheese-title">SwissCheese</div>
            <div class="swiss-cheese-subtitle">
              Operational board for live context health, backlog pressure, coordination exceptions, and project reach.
            </div>
          </div>
          <div class="swiss-cheese-header-actions">
            <button class="btn" @click="$store.swissCheese.refresh()" :disabled="$store.swissCheese.loading">Refresh</button>
            <button
              class="btn"
              @click="$store.swissCheese.bridgeFollowup('', false)"
              :disabled="!$store.swissCheese.followupEntries.some((item) => item.entry_source === 'pending')"
            >
              Bridge first pending
            </button>
          </div>
        </div>

        <div class="swiss-cheese-loading" x-show="$store.swissCheese.loading">
          <span class="material-symbols-outlined spinning">progress_activity</span>
          <span>Refreshing SwissCheese state...</span>
        </div>

        <template x-if="$store.swissCheese.chatState">
          <div class="swiss-cheese-body">
            <div class="swiss-toolbar">
              <div class="swiss-view-switch" x-show="$store.swissCheese.hasProjectView">
                <button
                  class="btn btn-small"
                  :class="{ 'btn-strong': $store.swissCheese.activeView === 'project' }"
                  @click="$store.swissCheese.setActiveView('project')"
                >
                  Current Project
                </button>
                <button
                  class="btn btn-small"
                  :class="{ 'btn-strong': $store.swissCheese.activeView === 'chat' }"
                  @click="$store.swissCheese.setActiveView('chat')"
                >
                  Active Chat
                </button>
              </div>

              <div class="swiss-filter-row">
                <div class="swiss-view-switch">
                  <button
                    class="btn btn-small"
                    :class="{ 'btn-strong': $store.swissCheese.targetKindFilter === 'all', 'btn-muted': $store.swissCheese.targetFilterDisabled('all') }"
                    :disabled="$store.swissCheese.targetFilterDisabled('all')"
                    @click="$store.swissCheese.setTargetKindFilter('all')"
                  >
                    All
                  </button>
                  <button
                    class="btn btn-small"
                    :class="{ 'btn-strong': $store.swissCheese.targetKindFilter === 'chat', 'btn-muted': $store.swissCheese.targetFilterDisabled('chat') }"
                    :disabled="$store.swissCheese.targetFilterDisabled('chat')"
                    @click="$store.swissCheese.setTargetKindFilter('chat')"
                  >
                    Chats
                  </button>
                  <button
                    class="btn btn-small"
                    :class="{ 'btn-strong': $store.swissCheese.targetKindFilter === 'task', 'btn-muted': $store.swissCheese.targetFilterDisabled('task') }"
                    :disabled="$store.swissCheese.targetFilterDisabled('task')"
                    @click="$store.swissCheese.setTargetKindFilter('task')"
                  >
                    Tasks
                  </button>
                </div>
                <label class="swiss-check">
                  <input type="checkbox" x-model="$store.swissCheese.projectOnly" @change="await $store.swissCheese.updateCatalogFilters()">
                  <span>Current project only</span>
                </label>
                <label class="swiss-check">
                  <input type="checkbox" x-model="$store.swissCheese.includePersisted" @change="await $store.swissCheese.updateCatalogFilters()">
                  <span>Include read-only contexts</span>
                </label>
              </div>
            </div>

            <div class="swiss-cheese-grid">
              <section class="swiss-card">
                <div class="swiss-card-title">Status</div>
                <div class="swiss-metric-list swiss-metric-list-inline">
                  <div class="swiss-metric">
                    <span>Chat gate</span>
                    <strong x-text="$store.swissCheese.contextWindow?.gate_active ? 'Blocked' : 'Open'"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Utility signal</span>
                    <strong x-text="$store.swissCheese.contextWindow?.utility_confidence || 'normal'"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Audit</span>
                    <strong x-text="$store.swissCheese.chatState?.audit_status?.state || 'idle'"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Recovery</span>
                    <strong x-text="(($store.swissCheese.chatState?.recovery_budget?.used_cycles || 0) + ' / ' + ($store.swissCheese.chatState?.recovery_budget?.max_cycles || 0))"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Main tokens</span>
                    <strong x-text="$store.swissCheese.contextWindow?.chat_model?.current_tokens || 0"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Remaining budget</span>
                    <strong x-text="$store.swissCheese.contextWindow?.chat_model?.remaining_budget || 0"></strong>
                  </div>
                </div>
                <div class="swiss-inline-note">
                  <strong>Main model:</strong>
                  <span x-text="($store.swissCheese.contextWindow?.chat_model?.provider || 'unconfigured') + '/' + ($store.swissCheese.contextWindow?.chat_model?.name || 'default')"></span>
                </div>
                <div class="swiss-inline-note">
                  <strong>Utility model:</strong>
                  <span x-text="($store.swissCheese.contextWindow?.utility_model?.provider || 'unconfigured') + '/' + ($store.swissCheese.contextWindow?.utility_model?.name || 'default')"></span>
                </div>
              </section>

              <section class="swiss-card">
                <div class="swiss-card-title">Reach</div>
                <div class="swiss-metric-list swiss-metric-list-inline">
                  <div class="swiss-metric">
                    <span>Current target</span>
                    <strong x-text="$store.swissCheese.chatCenterLabel"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Visible targets</span>
                    <strong x-text="$store.swissCheese.targetCatalog.length"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Actionable</span>
                    <strong x-text="$store.swissCheese.actionableTargets.length"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Read-only</span>
                    <strong x-text="$store.swissCheese.readOnlyTargets.length"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Chats</span>
                    <strong x-text="$store.swissCheese.targetCatalogCounts?.chat || 0"></strong>
                  </div>
                  <div class="swiss-metric">
                    <span>Tasks</span>
                    <strong x-text="$store.swissCheese.targetCatalogCounts?.task || 0"></strong>
                  </div>
                </div>
                <div class="swiss-inline-note">
                  <strong>Filter:</strong>
                  <span x-text="$store.swissCheese.targetKindFilter"></span>
                </div>
                <div class="swiss-inline-note">
                  <strong>Scope:</strong>
                  <span x-text="$store.swissCheese.projectOnly ? 'current project' : 'all reachable contexts'"></span>
                </div>
              </section>

              <template x-if="$store.swissCheese.isChatView">
                <section class="swiss-card swiss-card-wide">
                  <div class="swiss-card-title">Context Map</div>
                  <div class="swiss-map-layout">
                    <div class="swiss-map-surface swiss-chat-map">
                      <svg class="swiss-map-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                        <circle cx="50" cy="50" r="30" class="swiss-orbit-ring"></circle>
                        <template x-for="node in $store.swissCheese.chatMapNodes" :key="node.barrier">
                          <line x1="50" y1="50" :x2="node.x" :y2="node.y" class="swiss-map-line"></line>
                        </template>
                      </svg>

                      <button
                        type="button"
                        class="swiss-center-node"
                        @click="$store.swissCheese.clearBarrierPreview()"
                      >
                        <span class="swiss-center-eyebrow">Active chat</span>
                        <strong x-text="$store.swissCheese.chatCenterLabel"></strong>
                        <span x-text="($store.swissCheese.issues.length || 0) + ' open issues'"></span>
                      </button>

                      <template x-for="node in $store.swissCheese.chatMapNodes" :key="node.barrier">
                        <button
                          type="button"
                          class="swiss-map-node"
                          :class="{ 'is-active': ($store.swissCheese.activeBarrierCard?.barrier || '') === node.barrier }"
                          :style="node.style"
                          :data-severity="node.severity || 'clear'"
                          @mouseenter="$store.swissCheese.previewBarrier(node.barrier)"
                          @mouseleave="$store.swissCheese.clearBarrierPreview()"
                          @focus="$store.swissCheese.previewBarrier(node.barrier)"
                          @blur="$store.swissCheese.clearBarrierPreview()"
                          @click="$store.swissCheese.setBarrierSelection(node.barrier)"
                        >
                          <span class="swiss-map-node-label" x-text="node.barrier"></span>
                          <span class="swiss-node-badges">
                            <span class="swiss-node-badge swiss-node-count" x-text="node.badge"></span>
                            <span class="swiss-node-badge swiss-node-severity" :data-severity="node.severity || 'clear'" x-text="node.severityLabel"></span>
                          </span>
                        </button>
                      </template>
                    </div>

                    <div class="swiss-map-detail" x-show="$store.swissCheese.activeBarrierCard">
                      <template x-if="$store.swissCheese.activeBarrierCard">
                        <div class="swiss-detail-card">
                          <div class="swiss-detail-header">
                            <div>
                              <div class="swiss-detail-title" x-text="$store.swissCheese.activeBarrierCard.barrier"></div>
                              <div class="swiss-detail-copy" x-text="$store.swissCheese.activeBarrierCard.description"></div>
                            </div>
                            <div class="swiss-node-badges">
                              <span class="swiss-node-badge swiss-node-count" x-text="$store.swissCheese.activeBarrierCard.issueCount"></span>
                              <span class="swiss-node-badge swiss-node-severity" :data-severity="$store.swissCheese.activeBarrierCard.severity || 'clear'" x-text="($store.swissCheese.activeBarrierCard.severity || 'clear').toUpperCase()"></span>
                            </div>
                          </div>

                          <template x-if="!$store.swissCheese.activeBarrierCard.issueCount">
                            <div class="swiss-empty">No open issues in this lane.</div>
                          </template>

                          <template x-if="$store.swissCheese.activeBarrierCard.issueCount">
                            <div class="swiss-list">
                              <template x-for="hole in $store.swissCheese.activeBarrierCard.holes" :key="hole.id">
                                <div class="swiss-list-item">
                                  <div class="swiss-item-header">
                                    <strong x-text="hole.title"></strong>
                                    <span class="swiss-node-badge swiss-node-severity" :data-severity="hole.severity || 'clear'" x-text="(hole.severity || 'low').toUpperCase()"></span>
                                  </div>
                                  <div class="swiss-hole-detail" x-text="hole.trajectory || hole.evidence || hole.detail || ''"></div>
                                </div>
                              </template>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </div>
                </section>
              </template>

              <template x-if="$store.swissCheese.isProjectView && $store.swissCheese.projectRollup">
                <section class="swiss-card swiss-card-wide">
                  <div class="swiss-card-title">Context Map</div>
                  <div class="swiss-project-overview">
                    <div class="swiss-metric-list swiss-metric-list-inline">
                      <div class="swiss-metric">
                        <span>Project</span>
                        <strong x-text="$store.swissCheese.projectRollup?.project_title || $store.swissCheese.projectRollup?.project_name || ''"></strong>
                      </div>
                      <div class="swiss-metric">
                        <span>Visible targets</span>
                        <strong x-text="$store.swissCheese.projectTargets.length"></strong>
                      </div>
                      <div class="swiss-metric">
                        <span>Chats</span>
                        <strong x-text="($store.swissCheese.projectTargets || []).filter((target) => target.kind === 'chat').length"></strong>
                      </div>
                      <div class="swiss-metric">
                        <span>Tasks</span>
                        <strong x-text="($store.swissCheese.projectTargets || []).filter((target) => target.kind === 'task').length"></strong>
                      </div>
                      <div class="swiss-metric">
                        <span>Read-only</span>
                        <strong x-text="$store.swissCheese.readOnlyTargets.length"></strong>
                      </div>
                    </div>
                  </div>

                  <div class="swiss-map-layout">
                    <div class="swiss-map-surface swiss-project-map">
                      <svg class="swiss-map-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                        <template x-for="target in $store.swissCheese.projectGraphNodes" :key="target.target_key">
                          <line x1="50" y1="50" :x2="target.x" :y2="target.y" class="swiss-map-line"></line>
                        </template>
                      </svg>

                      <div class="swiss-project-node swiss-project-node-center">
                        <span class="swiss-center-eyebrow">Project</span>
                        <strong x-text="$store.swissCheese.projectRollup?.project_title || $store.swissCheese.projectRollup?.project_name || ''"></strong>
                        <span x-text="$store.swissCheese.projectRollup?.target_count || 0"></span>
                      </div>

                      <template x-for="target in $store.swissCheese.projectGraphNodes" :key="target.target_key">
                        <button
                          type="button"
                          class="swiss-project-node"
                          :class="{ 'is-active': ($store.swissCheese.selectedProjectTarget?.target_key || '') === target.target_key }"
                          :style="`left:${target.x}%; top:${target.y}%;`"
                          :data-severity="target.severity || 'clear'"
                          :data-queueable="target.permissions?.can_queue ? 'true' : 'false'"
                          @click="await $store.swissCheese.selectProjectTarget(target.target_key)"
                          @focus="await $store.swissCheese.selectProjectTarget(target.target_key)"
                        >
                          <span class="swiss-map-node-label" x-text="target.name"></span>
                          <span class="swiss-project-node-meta" x-text="target.kind === 'task' ? 'Task' : 'Chat'"></span>
                          <span class="swiss-node-badges">
                            <span class="swiss-node-badge swiss-node-count" x-text="target.issueCount"></span>
                            <span class="swiss-node-badge swiss-node-severity" :data-severity="target.severity || 'clear'" x-text="target.severityLabel"></span>
                          </span>
                        </button>
                      </template>
                    </div>

                    <div class="swiss-map-detail">
                      <template x-if="$store.swissCheese.inspection?.target">
                        <div class="swiss-detail-card">
                          <div class="swiss-detail-header">
                            <div>
                              <div class="swiss-detail-title" x-text="$store.swissCheese.inspection.target.name"></div>
                              <div class="swiss-detail-copy" x-text="$store.swissCheese.targetLabel($store.swissCheese.inspection.target, { includeQueueability: true })"></div>
                            </div>
                            <span
                              class="swiss-node-badge swiss-node-severity"
                              :data-severity="$store.swissCheese.targetSeverity($store.swissCheese.inspection.target) || 'clear'"
                              x-text="$store.swissCheese.inspection.permissions?.can_queue ? 'ACTIONABLE' : 'READ-ONLY'"
                            ></span>
                          </div>

                          <div class="swiss-metric-list swiss-metric-list-inline">
                            <div class="swiss-metric">
                              <span>Issues</span>
                              <strong x-text="$store.swissCheese.inspection.target?.state_excerpt?.hole_count || 0"></strong>
                            </div>
                            <div class="swiss-metric">
                              <span>Backlog</span>
                              <strong x-text="$store.swissCheese.inspection.target?.state_excerpt?.open_todo_count || 0"></strong>
                            </div>
                            <div class="swiss-metric">
                              <span>Near misses</span>
                              <strong x-text="$store.swissCheese.inspection.target?.state_excerpt?.near_miss_count || 0"></strong>
                            </div>
                            <div class="swiss-metric">
                              <span>Queue</span>
                              <strong x-text="$store.swissCheese.inspection.target?.state_excerpt?.native_queue_count || 0"></strong>
                            </div>
                          </div>

                          <div class="swiss-inline-note">
                            <strong>Match:</strong>
                            <span x-text="$store.swissCheese.inspection.match_type || 'n/a'"></span>
                          </div>
                          <div class="swiss-inline-note">
                            <strong>Project:</strong>
                            <span x-text="$store.swissCheese.inspection.target?.project_title || $store.swissCheese.inspection.target?.project_name || 'none'"></span>
                          </div>
                          <div class="swiss-inline-note" x-show="$store.swissCheese.inspection.target?.kind === 'task'">
                            <strong>Scheduler:</strong>
                            <span x-text="(($store.swissCheese.inspection.target?.scheduler?.type || 'task') + ' / ' + ($store.swissCheese.inspection.target?.scheduler?.state || 'unknown'))"></span>
                          </div>
                          <div class="swiss-inline-note" x-show="$store.swissCheese.inspection.target?.kind === 'task'">
                            <strong>Next run:</strong>
                            <span x-text="$store.swissCheese.inspection.target?.scheduler?.next_run || 'n/a'"></span>
                          </div>
                        </div>
                      </template>

                      <template x-if="!$store.swissCheese.inspection?.target">
                        <div class="swiss-detail-card">
                          <div class="swiss-empty">Select a context to inspect its current health and reachability.</div>
                        </div>
                      </template>
                    </div>
                  </div>
                </section>
              </template>

              <section class="swiss-card swiss-card-wide">
                <div class="swiss-card-title">Issues</div>
                <template x-if="!$store.swissCheese.issues.length">
                  <div class="swiss-empty">No open SwissCheese issues.</div>
                </template>
                <template x-if="$store.swissCheese.issues.length">
                  <div class="swiss-list">
                    <template x-for="hole in $store.swissCheese.issues" :key="hole.id">
                      <div class="swiss-list-item">
                        <div class="swiss-item-header">
                          <div>
                            <strong x-text="hole.title"></strong>
                            <div class="swiss-hole-detail" x-text="hole.barrier"></div>
                          </div>
                          <span class="swiss-node-badge swiss-node-severity" :data-severity="hole.severity || 'clear'" x-text="(hole.severity || 'low').toUpperCase()"></span>
                        </div>
                        <div class="swiss-hole-detail" x-text="hole.trajectory || hole.evidence || hole.detail || ''"></div>
                      </div>
                    </template>
                  </div>
                </template>
              </section>

              <section class="swiss-card">
                <div class="swiss-card-title">Active Chat Backlog</div>
                <div class="swiss-card-actions">
                  <button class="btn btn-small" @click="$store.swissCheese.clearCompletedTodos('chat')">Clear completed</button>
                </div>
                <template x-if="!($store.swissCheese.chatState?.todos || []).length">
                  <div class="swiss-empty">No chat-local backlog items.</div>
                </template>
                <template x-if="($store.swissCheese.chatState?.todos || []).length">
                  <div class="swiss-todo-list">
                    <template x-for="todo in ($store.swissCheese.chatState?.todos || [])" :key="todo.id">
                      <div class="swiss-todo">
                        <div>
                          <strong x-text="todo.title"></strong>
                          <div class="swiss-hole-detail" x-text="todo.detail || ''"></div>
                        </div>
                        <button class="btn btn-small" @click="$store.swissCheese.resolveTodo(todo.id, 'chat')" x-show="todo.status !== 'completed'">Resolve</button>
                      </div>
                    </template>
                  </div>
                </template>
              </section>

              <section class="swiss-card">
                <div class="swiss-card-title">Project Backlog</div>
                <div class="swiss-card-actions" x-show="$store.swissCheese.projectState">
                  <button class="btn btn-small" @click="$store.swissCheese.clearCompletedTodos('project')">Clear completed</button>
                </div>
                <template x-if="!$store.swissCheese.projectState">
                  <div class="swiss-empty">No active project. Project backlog is unavailable in this chat.</div>
                </template>
                <template x-if="$store.swissCheese.projectState && !(($store.swissCheese.projectState?.todos || []).length)">
                  <div class="swiss-empty">No shared project backlog items.</div>
                </template>
                <template x-if="$store.swissCheese.projectState && (($store.swissCheese.projectState?.todos || []).length)">
                  <div class="swiss-todo-list">
                    <template x-for="todo in ($store.swissCheese.projectState?.todos || [])" :key="todo.id">
                      <div class="swiss-todo">
                        <div>
                          <strong x-text="todo.title"></strong>
                          <div class="swiss-hole-detail" x-text="todo.detail || ''"></div>
                          <div class="swiss-todo-origin" x-text="todo.origin_context_name ? ('Origin: ' + todo.origin_context_name) : ''"></div>
                        </div>
                        <button class="btn btn-small" @click="$store.swissCheese.resolveTodo(todo.id, 'project')" x-show="todo.status !== 'completed'">Resolve</button>
                      </div>
                    </template>
                  </div>
                </template>
              </section>

              <section class="swiss-card">
                <div class="swiss-card-title">Near Misses</div>
                <template x-if="!($store.swissCheese.chatState?.near_misses || []).length">
                  <div class="swiss-empty">No near misses recorded yet.</div>
                </template>
                <template x-if="($store.swissCheese.chatState?.near_misses || []).length">
                  <div class="swiss-list">
                    <template x-for="item in ($store.swissCheese.chatState?.near_misses || [])" :key="item.id">
                      <div class="swiss-list-item">
                        <div class="swiss-item-header">
                          <div>
                            <strong x-text="item.title"></strong>
                            <div class="swiss-hole-detail" x-text="item.barrier || 'Direction'"></div>
                          </div>
                          <span class="swiss-node-badge swiss-node-severity" :data-severity="item.severity || 'clear'" x-text="(item.severity || 'low').toUpperCase()"></span>
                        </div>
                        <div class="swiss-hole-detail" x-text="item.detail || ''"></div>
                      </div>
                    </template>
                  </div>
                </template>
              </section>

              <section class="swiss-card swiss-card-wide">
                <div class="swiss-card-title">Followups</div>
                <div class="swiss-inline-note">Automatic delivery stays the default. Manual actions remain only for pending, blocked, or removed exceptions.</div>
                <template x-if="!$store.swissCheese.followupEntries.length">
                  <div class="swiss-empty">No followups in queue or history.</div>
                </template>
                <template x-if="$store.swissCheese.followupEntries.length">
                  <div class="swiss-list">
                    <template x-for="item in $store.swissCheese.followupEntries" :key="`${item.fingerprint}-${item.delivery_state || item.status}-${item.entry_source}`">
                      <div class="swiss-list-item swiss-followup-item">
                        <div class="swiss-followup-body">
                          <div class="swiss-item-header">
                            <div>
                              <strong x-text="item.reason"></strong>
                              <div class="swiss-hole-detail" x-text="item.target_name ? ('Target: ' + item.target_name) : item.target_key"></div>
                            </div>
                            <div class="swiss-node-badges">
                              <span class="swiss-node-badge swiss-node-count" x-text="item.entry_source"></span>
                              <span
                                class="swiss-node-badge swiss-node-severity"
                                :data-severity="item.delivery_state === 'blocked' ? 'high' : ((item.delivery_state === 'sent' || item.delivery_state === 'queued_in_target_queue') ? 'low' : 'medium')"
                                x-text="item.delivery_state || item.status || 'pending'"
                              ></span>
                            </div>
                          </div>
                          <div class="swiss-hole-detail" x-text="item.text || ''"></div>
                          <div class="swiss-hole-detail" x-show="item.blocked_reason" x-text="'Blocked: ' + item.blocked_reason"></div>
                        </div>

                        <div class="swiss-inline-actions">
                          <button class="btn btn-small" x-show="item.entry_source === 'pending'" @click="$store.swissCheese.bridgeFollowup(item.fingerprint, false)">Bridge</button>
                          <button class="btn btn-small" x-show="item.entry_source === 'pending' || item.delivery_state === 'queued_in_target_queue'" @click="$store.swissCheese.bridgeFollowup(item.fingerprint, true)">Send now</button>
                          <button class="btn btn-small" x-show="item.entry_source === 'pending' || item.delivery_state === 'queued_in_target_queue'" @click="$store.swissCheese.removeFollowup(item.fingerprint)">Remove</button>
                          <button
                            class="btn btn-small"
                            x-show="item.delivery_state === 'blocked' || item.delivery_state === 'removed' || item.status === 'blocked' || item.status === 'removed'"
                            @click="$store.swissCheese.retryFollowup(item.fingerprint)"
                          >
                            Retry
                          </button>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </section>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>

  <style>
    .swiss-cheese-dashboard {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .swiss-cheese-header {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .swiss-cheese-title {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .swiss-cheese-subtitle {
      color: var(--color-text-secondary);
      max-width: 48rem;
      line-height: 1.45;
    }

    .swiss-cheese-header-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .swiss-cheese-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .swiss-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .swiss-view-switch,
    .swiss-filter-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn-strong {
      border-color: var(--color-primary);
      box-shadow: inset 0 0 0 1px var(--color-primary);
    }

    .btn-muted {
      opacity: 0.55;
    }

    .swiss-cheese-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .swiss-card {
      border: 1px solid var(--color-border);
      border-radius: 14px;
      padding: 0.95rem;
      background:
        linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-panel) 94%, white 6%) 0%,
          color-mix(in srgb, var(--color-panel) 88%, black 12%) 100%
        );
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      box-shadow: 0 10px 30px color-mix(in srgb, black 10%, transparent);
    }

    .swiss-card-wide {
      grid-column: 1 / -1;
    }

    .swiss-card-title {
      font-weight: 700;
      font-size: 0.98rem;
    }

    .swiss-card-actions {
      display: flex;
      justify-content: flex-end;
    }

    .swiss-metric-list {
      display: grid;
      gap: 0.55rem;
    }

    .swiss-metric-list-inline {
      grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
    }

    .swiss-metric {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      border: 1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
      border-radius: 10px;
      padding: 0.6rem 0.7rem;
      background: color-mix(in srgb, var(--color-panel) 92%, black 8%);
    }

    .swiss-inline-note {
      color: var(--color-text-secondary);
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .swiss-map-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(18rem, 0.9fr);
      gap: 1rem;
      align-items: stretch;
    }

    .swiss-map-surface {
      position: relative;
      min-height: 26rem;
      border: 1px solid color-mix(in srgb, var(--color-primary) 24%, var(--color-border));
      border-radius: 18px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, color-mix(in srgb, var(--color-primary) 12%, transparent), transparent 44%),
        radial-gradient(circle at bottom right, color-mix(in srgb, white 8%, transparent), transparent 38%),
        linear-gradient(160deg, color-mix(in srgb, var(--color-panel) 86%, black 14%) 0%, color-mix(in srgb, var(--color-panel) 96%, white 4%) 100%);
    }

    .swiss-map-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .swiss-map-line {
      stroke: color-mix(in srgb, var(--color-primary) 26%, var(--color-border));
      stroke-width: 1.1;
      stroke-linecap: round;
      opacity: 0.85;
    }

    .swiss-orbit-ring {
      fill: none;
      stroke: color-mix(in srgb, var(--color-primary) 20%, var(--color-border));
      stroke-width: 0.8;
      stroke-dasharray: 2 2;
      opacity: 0.9;
    }

    .swiss-center-node,
    .swiss-project-node {
      position: absolute;
      transform: translate(-50%, -50%);
      border: 1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
      border-radius: 16px;
      background: color-mix(in srgb, var(--color-panel) 88%, black 12%);
      color: inherit;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      text-align: left;
      min-width: 10rem;
      box-shadow: 0 12px 26px color-mix(in srgb, black 18%, transparent);
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    .swiss-center-node:hover,
    .swiss-center-node:focus,
    .swiss-map-node:hover,
    .swiss-map-node:focus,
    .swiss-project-node:hover,
    .swiss-project-node:focus,
    .swiss-map-node.is-active,
    .swiss-project-node.is-active {
      border-color: color-mix(in srgb, var(--color-primary) 62%, var(--color-border));
      box-shadow: 0 18px 40px color-mix(in srgb, var(--color-primary) 16%, transparent);
      transform: translate(-50%, -50%) scale(1.02);
    }

    .swiss-center-node {
      left: 50%;
      top: 50%;
      min-width: 12rem;
      align-items: flex-start;
      z-index: 2;
    }

    .swiss-center-eyebrow {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
    }

    .swiss-map-node {
      position: absolute;
      transform: translate(-50%, -50%);
      border: 1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
      border-radius: 16px;
      background: color-mix(in srgb, var(--color-panel) 90%, black 10%);
      padding: 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      min-width: 9rem;
      text-align: left;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 10px 24px color-mix(in srgb, black 14%, transparent);
    }

    .swiss-map-node[data-severity="high"],
    .swiss-map-node[data-severity="critical"],
    .swiss-project-node[data-severity="high"],
    .swiss-project-node[data-severity="critical"] {
      border-color: color-mix(in srgb, #d65f5f 55%, var(--color-border));
    }

    .swiss-map-node-label {
      font-weight: 700;
      line-height: 1.25;
    }

    .swiss-project-node {
      min-width: 8.75rem;
      max-width: 11rem;
      z-index: 2;
    }

    .swiss-project-node-center {
      left: 50%;
      top: 50%;
      min-width: 11rem;
      z-index: 1;
    }

    .swiss-project-node-meta {
      color: var(--color-text-secondary);
      font-size: 0.82rem;
    }

    .swiss-project-node[data-queueable="false"] {
      opacity: 0.86;
      border-style: dashed;
    }

    .swiss-node-badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .swiss-node-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.5rem;
      padding: 0.2rem 0.45rem;
      border-radius: 999px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border: 1px solid color-mix(in srgb, var(--color-border) 86%, transparent);
      background: color-mix(in srgb, var(--color-panel) 90%, black 10%);
    }

    .swiss-node-count {
      min-width: 1.7rem;
    }

    .swiss-node-severity[data-severity="low"],
    .swiss-node-severity[data-severity="clear"] {
      border-color: color-mix(in srgb, #5fa66a 46%, var(--color-border));
      color: color-mix(in srgb, #5fa66a 78%, white 22%);
    }

    .swiss-node-severity[data-severity="medium"] {
      border-color: color-mix(in srgb, #c8a34a 50%, var(--color-border));
      color: color-mix(in srgb, #c8a34a 78%, white 22%);
    }

    .swiss-node-severity[data-severity="high"],
    .swiss-node-severity[data-severity="critical"] {
      border-color: color-mix(in srgb, #d65f5f 60%, var(--color-border));
      color: color-mix(in srgb, #d65f5f 82%, white 18%);
    }

    .swiss-map-detail {
      min-width: 0;
    }

    .swiss-detail-card {
      height: 100%;
      border: 1px solid color-mix(in srgb, var(--color-border) 88%, transparent);
      border-radius: 16px;
      padding: 0.9rem;
      background: color-mix(in srgb, var(--color-panel) 94%, white 6%);
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .swiss-detail-header,
    .swiss-item-header {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .swiss-detail-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .swiss-detail-copy,
    .swiss-hole-detail,
    .swiss-todo-origin {
      color: var(--color-text-secondary);
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .swiss-project-overview {
      margin-bottom: 0.1rem;
    }

    .swiss-list,
    .swiss-todo-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .swiss-list-item,
    .swiss-todo {
      border: 1px solid color-mix(in srgb, var(--color-border) 86%, transparent);
      border-radius: 12px;
      padding: 0.75rem;
      background: color-mix(in srgb, var(--color-panel) 95%, white 5%);
    }

    .swiss-todo,
    .swiss-followup-item {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .swiss-followup-body {
      display: grid;
      gap: 0.45rem;
      min-width: 0;
      flex: 1 1 auto;
    }

    .swiss-check {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .swiss-inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .swiss-empty {
      color: var(--color-text-secondary);
      font-style: italic;
    }

    .swiss-cheese-loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-text-secondary);
    }

    .btn-small {
      padding: 0.35rem 0.6rem;
      font-size: 0.8rem;
    }

    .spinning {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1080px) {
      .swiss-map-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 960px) {
      .swiss-cheese-grid {
        grid-template-columns: 1fr;
      }

      .swiss-card-wide {
        grid-column: auto;
      }
    }

    @media (max-width: 720px) {
      .swiss-map-surface {
        min-height: 34rem;
      }

      .swiss-center-node,
      .swiss-map-node,
      .swiss-project-node {
        min-width: 7.75rem;
        padding: 0.6rem;
      }

      .swiss-followup-item,
      .swiss-todo {
        flex-direction: column;
      }

      .swiss-inline-actions {
        justify-content: flex-start;
      }
    }
  </style>
</body>
</html>
