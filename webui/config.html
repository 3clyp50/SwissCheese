<html>
<head>
  <title>SwissCheese</title>
  <script type="module">
    import * as api from "/js/api.js";
    import { getContext } from "/index.js";
    import { store as chatsStore } from "/components/sidebar/chats/chats-store.js";
    import {
      toastFrontendError,
      toastFrontendSuccess,
      toastFrontendInfo,
    } from "/components/notifications/notification-store.js";

    const ENDPOINT = "/plugins/swiss_cheese/swiss_cheese";

    const MODEL_SCOPE_LABELS = {
      global: "Global model config",
      project: "Project model config",
      agent: "Agent profile model config",
      project_agent: "Project + profile model config",
      default: "Bundled model defaults",
    };

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value || {}));
    }

    function replaceConfig(target, nextValue) {
      Object.keys(target || {}).forEach((key) => {
        delete target[key];
      });
      Object.assign(target || {}, deepClone(nextValue));
    }

    window.createSwissCheeseConfigModel = (context, config) => ({
      scopeInfo: null,
      modelSnapshot: null,
      activeContext: null,
      loadingSnapshot: false,
      chatConfirmValue: "",
      utilityConfirmValue: "",

      currentContextId() {
        return chatsStore.selected || getContext() || "";
      },

      initDefaults() {
        if (!config.cross_chat_scope) {
          config.cross_chat_scope = {
            same_project_live_write: false,
            same_project_persisted_readonly: false,
            cross_project: false,
          };
        }
        if (!config.confirmed_model_tuples) {
          config.confirmed_model_tuples = {
            chat_model: [],
            utility_model: [],
          };
        }
      },

      applyResolvedConfig(resolvedConfig) {
        replaceConfig(config, resolvedConfig || {});
        this.initDefaults();
      },

      formatProject(projectName) {
        return projectName ? context.projectLabel(projectName) : "Global";
      },

      formatSwissSource(source) {
        if (!source) return "Bundled defaults";
        if (source.scope === "default") return "Bundled defaults";
        const base = source.scope === "project"
          ? `Project ${this.formatProject(source.project_name)}`
          : "Global";
        return source.legacy_profile
          ? `${base} via legacy profile ${source.agent_profile || "unknown"}`
          : base;
      },

      formatSwissTarget(target) {
        if (!target) return "Global";
        return target.scope === "project"
          ? `Project ${this.formatProject(target.project_name)}`
          : "Global";
      },

      formatModelSource(source) {
        if (!source) return "Bundled model defaults";
        const label = MODEL_SCOPE_LABELS[source.scope] || "Model config";
        if (source.scope === "project_agent") {
          return `${label} for ${this.formatProject(source.project_name)} / ${source.agent_profile || "profile"}`;
        }
        if (source.scope === "project") {
          return `${label} for ${this.formatProject(source.project_name)}`;
        }
        if (source.scope === "agent") {
          return `${label} for ${source.agent_profile || "profile"}`;
        }
        return label;
      },

      contextSummary() {
        if (!this.activeContext) return "No active chat selected";
        const parts = [this.activeContext.context_name || this.activeContext.context_id];
        if (this.activeContext.project_name) parts.push(this.formatProject(this.activeContext.project_name));
        if (this.activeContext.agent_profile) parts.push(this.activeContext.agent_profile);
        return parts.join(" | ");
      },

      searchQueryFor(slot) {
        const model = this.modelSnapshot?.config?.[slot] || {};
        const provider = model.provider || "";
        const name = model.name || "";
        return `"${[provider, name, "context window tokens"].filter(Boolean).join(" ")}"`;
      },

      async loadScopeSnapshot() {
        this.loadingSnapshot = true;
        try {
          const response = await api.callJsonApi(ENDPOINT, {
            action: "get_config_context",
            context_id: this.currentContextId(),
            project_name: context.projectName || "",
          });
          this.scopeInfo = response?.scope || null;
          this.modelSnapshot = response?.model_snapshot || null;
          this.activeContext = response?.active_context || null;
          this.applyResolvedConfig(response?.config || {});
          this.chatConfirmValue = String(response?.model_snapshot?.config?.chat_model?.ctx_length || "");
          this.utilityConfirmValue = String(response?.model_snapshot?.config?.utility_model?.ctx_length || "");
        } catch (error) {
          void toastFrontendError(error?.message || "Failed to load SwissCheese scope context", "SwissCheese");
        } finally {
          this.loadingSnapshot = false;
        }
      },

      async confirmSlot(slot) {
        const snapshot = this.modelSnapshot?.config?.[slot] || {};
        const value = slot === "chat_model" ? this.chatConfirmValue : this.utilityConfirmValue;
        const ctxLength = parseInt(value || "0", 10);
        if (!snapshot.provider || !snapshot.name || !ctxLength) {
          void toastFrontendInfo("Provider, model name, and context length are required before confirmation.", "SwissCheese");
          return;
        }

        try {
          await api.callJsonApi(ENDPOINT, {
            action: "confirm_ctx_window",
            context_id: this.currentContextId(),
            project_name: context.projectName || "",
            slot,
            provider: snapshot.provider,
            name: snapshot.name,
            ctx_length: ctxLength,
            update_model_config: true,
            model_project_name: this.modelSnapshot?.writeback_to?.project_name || "",
            model_agent_profile: this.modelSnapshot?.writeback_to?.agent_profile || "",
          });
          await this.loadScopeSnapshot();
          void toastFrontendSuccess(`Confirmed ${slot.replace("_", " ")}`, "SwissCheese");
        } catch (error) {
          void toastFrontendError(error?.message || "Failed to confirm context window", "SwissCheese");
        }
      },
    });
  </script>
</head>
<body>
  <div
    x-data="createSwissCheeseConfigModel(context, config)"
    x-init="
      initDefaults();
      await loadScopeSnapshot();
      $watch('context.projectName', async () => { await loadScopeSnapshot(); });
      $watch('context.loadedPath', async () => { await loadScopeSnapshot(); });
    "
  >
    <template x-if="config">
      <div class="swiss-config">
        <div class="section-title">SwissCheese</div>
        <div class="section-description">
          SwissCheese is the resilience harness for the active conversation. It tracks holes, context-window confidence, bounded recovery, and same-project orchestration scope.
        </div>

        <div class="swiss-scope-panel">
          <div class="swiss-scope-grid">
            <div class="swiss-scope-chip">
              <span>Applies to</span>
              <strong x-text="formatSwissTarget(scopeInfo?.applies_to)"></strong>
            </div>
            <div class="swiss-scope-chip">
              <span>Loaded from</span>
              <strong x-text="formatSwissSource(scopeInfo?.loaded_from)"></strong>
            </div>
          </div>
          <div class="swiss-scope-path" x-show="scopeInfo?.loaded_from?.path" x-text="scopeInfo?.loaded_from?.path || ''"></div>
          <div class="swiss-scope-note" x-show="scopeInfo?.legacy_absorbed">
            Legacy profile-scoped SwissCheese settings will be absorbed into this surviving scope on save or confirmation.
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Preferred working limit</div>
            <div class="field-description">Best-practice working envelope for SwissCheese state and advisories.</div>
          </div>
          <div class="field-control">
            <input type="number" min="1" x-model.number="config.preferred_working_limit">
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Advisory threshold</div>
            <div class="field-description">Above this configured context length, SwissCheese warns that the normal working envelope should stay at or below the preferred limit.</div>
          </div>
          <div class="field-control">
            <input type="number" min="1" x-model.number="config.advisory_threshold">
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Allow large-context override</div>
            <div class="field-description">Explicitly acknowledge that this scope may deliberately exceed the normal SwissCheese working-envelope guidance.</div>
          </div>
          <div class="field-control">
            <label class="toggle">
              <input type="checkbox" x-model="config.allow_large_context_override">
              <span class="toggler"></span>
            </label>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Automatic recovery budget</div>
            <div class="field-description">Maximum bounded recovery cycles per explicit user turn.</div>
          </div>
          <div class="field-control">
            <input type="number" min="0" max="5" x-model.number="config.max_auto_recovery_cycles">
          </div>
        </div>

        <div class="section-title">Orchestration Scope</div>
        <div class="field">
          <div class="field-label">
            <div class="field-title">Same-project live write</div>
            <div class="field-description">Allow bounded followups to other live chats in the same project.</div>
          </div>
          <div class="field-control">
            <label class="toggle">
              <input type="checkbox" x-model="config.cross_chat_scope.same_project_live_write">
              <span class="toggler"></span>
            </label>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Same-project persisted readonly</div>
            <div class="field-description">Allow inspecting persisted same-project chats without queueing into them.</div>
          </div>
          <div class="field-control">
            <label class="toggle">
              <input type="checkbox" x-model="config.cross_chat_scope.same_project_persisted_readonly">
              <span class="toggler"></span>
            </label>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Cross-project orchestration</div>
            <div class="field-description">Keep this off unless the scope explicitly needs cross-project read/write behavior.</div>
          </div>
          <div class="field-control">
            <label class="toggle">
              <input type="checkbox" x-model="config.cross_chat_scope.cross_project">
              <span class="toggler"></span>
            </label>
          </div>
        </div>

        <div class="section-title">Context Questionnaire</div>
        <div class="section-description">
          SwissCheese autonomy is gated until the active chat-model context length has been explicitly confirmed for this scope. Confirmations are stored as scoped `(provider, model, ctx_length)` tuples.
        </div>

        <div class="swiss-scope-panel swiss-scope-panel-compact">
          <div class="swiss-scope-grid">
            <div class="swiss-scope-chip">
              <span>Active snapshot</span>
              <strong x-text="contextSummary()"></strong>
            </div>
            <div class="swiss-scope-chip">
              <span>Model loaded from</span>
              <strong x-text="formatModelSource(modelSnapshot?.loaded_from)"></strong>
            </div>
          </div>
          <div class="swiss-scope-path" x-show="modelSnapshot?.loaded_from?.path" x-text="modelSnapshot?.loaded_from?.path || ''"></div>
        </div>

        <div class="swiss-config-loading" x-show="loadingSnapshot">
          <span class="material-symbols-outlined spinning">progress_activity</span>
          <span>Loading active model snapshot...</span>
        </div>

        <template x-if="modelSnapshot && modelSnapshot.config">
          <div class="swiss-questionnaire">
            <div class="swiss-question-card">
              <div class="swiss-question-title">Chat model</div>
              <div class="swiss-question-detail" x-text="`${modelSnapshot.config.chat_model?.provider || ''}/${modelSnapshot.config.chat_model?.name || ''}`"></div>
              <input type="number" min="1" x-model="chatConfirmValue">
              <div class="swiss-question-query" x-text="searchQueryFor('chat_model')"></div>
              <button class="btn" @click="confirmSlot('chat_model')">Confirm chat context</button>
            </div>

            <div class="swiss-question-card">
              <div class="swiss-question-title">Utility model</div>
              <div class="swiss-question-detail" x-text="`${modelSnapshot.config.utility_model?.provider || ''}/${modelSnapshot.config.utility_model?.name || ''}`"></div>
              <input type="number" min="1" x-model="utilityConfirmValue">
              <div class="swiss-question-query" x-text="searchQueryFor('utility_model')"></div>
              <button class="btn" @click="confirmSlot('utility_model')">Confirm utility context</button>
            </div>
          </div>
        </template>

        <div class="section-title">Confirmation Registry</div>
        <div class="section-description">
          Chat tuples: <strong x-text="(config.confirmed_model_tuples.chat_model || []).length"></strong>
          |
          Utility tuples: <strong x-text="(config.confirmed_model_tuples.utility_model || []).length"></strong>
        </div>
      </div>
    </template>
  </div>

  <style>
    .swiss-config {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .swiss-scope-panel {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 0.85rem 0.95rem;
      background:
        linear-gradient(
          135deg,
          color-mix(in srgb, var(--color-primary) 7%, var(--color-panel)) 0%,
          var(--color-panel) 100%
        );
      display: grid;
      gap: 0.5rem;
    }
    .swiss-scope-panel-compact {
      background: var(--color-panel);
    }
    .swiss-scope-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.6rem;
    }
    .swiss-scope-chip {
      display: grid;
      gap: 0.2rem;
      min-width: 0;
    }
    .swiss-scope-chip span {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--color-text-secondary);
    }
    .swiss-scope-chip strong,
    .swiss-scope-path {
      word-break: break-word;
    }
    .swiss-scope-note {
      color: var(--color-text-secondary);
      font-size: 0.88rem;
    }
    .swiss-config-loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-text-secondary);
    }
    .swiss-questionnaire {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.9rem;
    }
    .swiss-question-card {
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      background: var(--color-panel);
    }
    .swiss-question-title {
      font-weight: 700;
    }
    .swiss-question-detail {
      color: var(--color-text-secondary);
      word-break: break-word;
    }
    .swiss-question-query {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      word-break: break-word;
    }
    .spinning {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @media (max-width: 820px) {
      .swiss-scope-grid,
      .swiss-questionnaire {
        grid-template-columns: 1fr;
      }
    }
  </style>
</body>
</html>
